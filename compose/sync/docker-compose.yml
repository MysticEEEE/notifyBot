services:
  couchdb:
    image: couchdb:3.3.3
    container_name: obsidian-couchdb
    restart: always
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    volumes:
      - /mnt/f/Docker/sync/couchdb-data:/opt/couchdb/data
      - /mnt/f/Docker/sync/couchdb-etc:/opt/couchdb/etc/local.d
    env_file:
      - .env
    networks:
      - proxy

networks:
  proxy:
    external: true
