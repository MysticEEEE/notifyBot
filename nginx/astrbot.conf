# AstrBot WebUI
server {
    listen 80;
    server_name astrbot.mysticee.online astrbot.home;

    resolver 127.0.0.11 valid=30s;
    client_max_body_size 50M;

    location / {
        set $upstream http://astrbot:6185;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# AstrBot API (Claude Code hooks, webhooks)
server {
    listen 80;
    server_name astrbot-api.mysticee.online astrbot-api.home;

    resolver 127.0.0.11 valid=30s;
    client_max_body_size 10M;

    location / {
        set $upstream http://astrbot:6186;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
