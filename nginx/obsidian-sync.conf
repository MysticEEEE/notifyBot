server {
    listen 80;
    server_name obsidian-sync.mysticee.online obsidian-sync.home;

    resolver 127.0.0.11 valid=30s;
    client_max_body_size 100M;

    # Block common scanner paths (return 444 = drop connection)
    location ~* ^/(favicon|theme|imgs|assets|img|static|wp-|admin|login|phpmyadmin) {
        return 444;
    }

    # Only allow CouchDB API paths that LiveSync needs
    location / {
        # Block non-CouchDB user agents (basic bot filter)
        if ($http_user_agent ~* "bot|crawl|spider|scan|masscan|zgrab") {
            return 444;
        }

        set $upstream http://obsidian-couchdb:5984;
        proxy_pass $upstream;
        proxy_redirect off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
